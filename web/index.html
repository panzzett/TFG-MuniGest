  <title>Gestion de expedientes</title>
  <script>
    (function () {
      try {
        var t = (localStorage.getItem('tema') || '').toLowerCase();
        if (t === 'claro' || t === 'oscuro') {
          document.documentElement.setAttribute('data-tema', t);
        }
      } catch (e) {}
    })();
  </script>
